version: '3.8'

services:
  # Redis
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - silicon-network

  # API 服务
  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=8080
      - WS_PORT=8081
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - silicon-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  # Web 前端
  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=http://localhost:8081
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - silicon-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  # Nginx 负载均衡
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - silicon-network

volumes:
  redis-data:

networks:
  silicon-network:
    driver: bridge