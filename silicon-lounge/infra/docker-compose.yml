version: '3.8'

services:
  # Redis - 高性能缓存
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # PostgreSQL - 持久化存储（可选）
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: silicon
      POSTGRES_PASSWORD: ${DB_PASSWORD:-silicon123}
      POSTGRES_DB: silicon_lounge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silicon"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # API 服务
  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=8080
      - WS_PORT=8081
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://silicon:${DB_PASSWORD:-silicon123}@postgres:5432/silicon_lounge
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Web 前端
  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:8080
      - NEXT_PUBLIC_WS_URL=http://api:8081
    ports:
      - "3000:3000"
    depends_on:
      - api
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 256M

  # Nginx 负载均衡
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  redis-data:
  postgres-data: